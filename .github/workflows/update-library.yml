name: Auto Update TMDB Library

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:      
    inputs:
      request_title:
        description: 'اسم المحتوى المطلوب'
        required: false
        default: ''
      request_id:
        description: 'رقم الـ ID الخاص بالمحتوى'
        required: false
        default: ''
      request_type:
        description: 'نوع المحتوى (movie أو tv)'
        required: false
        default: ''
      old_id: # 🛑 إضافة مدخل للإصلاح والحذف
        description: 'الـ ID القديم المراد حذفه وإصلاحه'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Strict 100 Scraper & Repair Tool
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          REQUEST_TITLE: ${{ github.event.inputs.request_title }}
          REQUEST_ID: ${{ github.event.inputs.request_id }}
          REQUEST_TYPE: ${{ github.event.inputs.request_type }}
          OLD_ID: ${{ github.event.inputs.old_id }} # 🛑 تمرير المعرف للسكربت
        run: node update_library.js

      - name: Commit and Push Library Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add library.json
          git commit -m "تحديث المكتبة: أوامر الأتمتة [skip ci]" || echo "لا توجد تعديلات جديدة لرفعها"
          git push
