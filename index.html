<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AWR Stream Hub | Premium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#141414', // لون نتفليكس المظلم
                        cardBg: '#1f1f1f',
                        brand: '#e50914', // أحمر احترافي
                        brandHover: '#b81d24'
                    },
                    fontFamily: { sans: ['Segoe UI', 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darkBg text-white min-h-screen font-sans overflow-x-hidden pb-16 md:pb-0 selection:bg-brand selection:text-white">

    <!-- القائمة العلوية (للشاشات الكبيرة) -->
    <nav id="navbar" class="fixed w-full z-40 transition-all duration-500 bg-gradient-to-b from-black/80 to-transparent py-4">
        <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2 cursor-pointer text-brand hover:scale-105 transition-transform">
                    <i class="fa-solid fa-play text-2xl"></i>
                    <span class="text-2xl font-black tracking-wider uppercase">AWR Hub</span>
                </div>
                <div class="hidden md:flex space-x-6 space-x-reverse text-sm font-medium">
                    <a href="#" class="text-white hover:text-brand transition">الرئيسية</a>
                    <a href="#movies" class="text-gray-300 hover:text-white transition">أفلام</a>
                    <a href="#series" class="text-gray-300 hover:text-white transition">مسلسلات</a>
                    <a href="#anime" class="text-gray-300 hover:text-white transition">أنمي</a>
                </div>
            </div>
            <div class="flex items-center gap-5">
                <button class="text-gray-300 hover:text-white text-lg"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button class="text-gray-300 hover:text-white text-lg hidden md:block"><i class="fa-regular fa-bell"></i></button>
                <div class="w-8 h-8 rounded-md bg-gradient-to-tr from-brand to-purple-600 cursor-pointer"></div>
            </div>
        </div>
    </nav>

    <!-- الهيرو السينمائي -->
    <header class="relative w-full h-[70vh] md:h-[90vh]">
        <div class="swiper heroSwiper w-full h-full">
            <div class="swiper-wrapper" id="heroWrapper"></div>
            <div class="swiper-pagination"></div>
        </div>
        <!-- تدرج لوني سفلي لدمج الهيرو مع المحتوى -->
        <div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-darkBg to-transparent z-10 pointer-events-none"></div>
    </header>

    <!-- أقسام المحتوى -->
    <main class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 -mt-20 relative z-20 space-y-10 pb-10">
        <section>
            <h2 class="text-xl md:text-2xl font-bold mb-4 text-white/90 px-2">أحدث الإضافات <i class="fa-solid fa-fire text-brand text-sm ml-2"></i></h2>
            <div class="swiper contentSwiper">
                <div class="swiper-wrapper" id="trendingContainer"></div>
            </div>
        </section>

        <section id="movies">
            <h2 class="text-xl md:text-2xl font-bold mb-4 text-white/90 px-2">أفلام تستحق المشاهدة</h2>
            <div class="swiper contentSwiper">
                <div class="swiper-wrapper" id="moviesContainer"></div>
            </div>
        </section>

        <section id="series">
            <h2 class="text-xl md:text-2xl font-bold mb-4 text-white/90 px-2">مسلسلات حصرية</h2>
            <div class="swiper contentSwiper">
                <div class="swiper-wrapper" id="seriesContainer"></div>
            </div>
        </section>
    </main>

    <!-- شريط التنقل السفلي للجوال (Mobile Bottom Nav) -->
    <div class="md:hidden fixed bottom-0 w-full bg-cardBg/90 backdrop-blur-lg border-t border-gray-800 z-50 flex justify-around items-center py-3 px-2">
        <button class="flex flex-col items-center gap-1 text-white"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px]">الرئيسية</span></button>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-white"><i class="fa-solid fa-magnifying-glass text-xl"></i><span class="text-[10px]">بحث</span></button>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-white"><i class="fa-solid fa-bookmark text-xl"></i><span class="text-[10px]">قائمتي</span></button>
        <button class="flex flex-col items-center gap-1 text-gray-400 hover:text-white"><i class="fa-solid fa-user text-xl"></i><span class="text-[10px]">حسابي</span></button>
    </div>

    <!-- النافذة المنبثقة للتفاصيل (Modal) - مخفية افتراضياً -->
    <div id="detailsModal" class="fixed inset-0 z-[100] hidden items-center justify-center">
        <!-- الخلفية السوداء الشفافة -->
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm modal-bg cursor-pointer"></div>
        <!-- صندوق التفاصيل -->
        <div class="relative bg-cardBg w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-t-2xl md:rounded-2xl shadow-2xl z-10 animate-slide-up mt-auto md:mt-0">
            <button class="absolute top-4 right-4 z-20 bg-black/50 hover:bg-white text-white hover:text-black w-8 h-8 rounded-full flex items-center justify-center transition modal-close">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modalContent" class="w-full">
                <!-- سيتم حقن تفاصيل الفيلم هنا عبر الجافاسكربت -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
