<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWR Stream Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- إعدادات ألوان مخصصة لـ Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darker text-white min-h-screen font-sans overflow-x-hidden m-0 p-0">

    <!-- القائمة العلوية -->
    <nav class="fixed w-full z-50 bg-darker/90 backdrop-blur-md border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-film text-primary text-2xl"></i>
                    <span class="text-xl font-bold tracking-wider">AWR Stream Hub</span>
                </div>
                <div class="hidden md:block">
                    <div class="flex items-baseline space-x-8 space-x-reverse">
                        <a href="#" class="text-white hover:text-primary transition-colors px-3 py-2 rounded-md text-sm font-medium">الرئيسية</a>
                        <a href="#" class="text-gray-300 hover:text-primary transition-colors px-3 py-2 rounded-md text-sm font-medium">أفلام</a>
                        <a href="#" class="text-gray-300 hover:text-primary transition-colors px-3 py-2 rounded-md text-sm font-medium">مسلسلات</a>
                        <a href="#" class="text-gray-300 hover:text-primary transition-colors px-3 py-2 rounded-md text-sm font-medium">أنمي</a>
                        <a href="#" class="text-gray-300 hover:text-primary transition-colors px-3 py-2 rounded-md text-sm font-medium">كيدراما</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- القسم الرئيسي والبحث -->
    <main class="relative min-h-screen flex flex-col items-center justify-center pt-16 px-4">
        <!-- تأثيرات خلفية -->
        <div class="absolute inset-0 overflow-hidden z-0 pointer-events-none">
            <div class="absolute -top-1/2 -right-1/2 w-full h-full bg-primary/10 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-0 left-0 w-1/2 h-1/2 bg-blue-900/10 blur-[100px] rounded-full"></div>
        </div>

        <div class="relative z-10 w-full text-center space-y-8 mt-10">
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-l from-white to-gray-400 drop-shadow-lg">
                عالم الترفيه بين يديك
            </h1>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto leading-relaxed">
                استكشف أضخم مكتبة للأفلام، المسلسلات، الأنمي، والدراما الكورية بجودة عالية.
            </p>
            
            <!-- شريط البحث -->
            <div class="relative w-full max-w-3xl mx-auto z-40 mt-8">
                <div class="relative flex items-center">
                    <i class="fa-solid fa-magnifying-glass absolute right-4 text-xl text-gray-400"></i>
                    <input 
                        type="text" 
                        id="searchInput"
                        placeholder="ابحث عن فيلم، مسلسل، أنمي..." 
                        class="w-full py-4 pr-12 pl-4 text-lg bg-dark border border-gray-700 rounded-full text-white placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-lg"
                    >
                </div>

                <!-- صندوق النتائج المنسدل -->
                <div id="resultsDropdown" class="hidden absolute w-full mt-3 bg-dark border border-gray-700 rounded-2xl shadow-2xl overflow-hidden animate-fade-in text-right">
                    <!-- سيتم حقن النتائج هنا بواسطة JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
