<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWR Stream Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#0f172a', darker: '#020617', primary: '#3b82f6', secondary: '#1e293b' }
                }
            }
        }
    </script>
    <!-- FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Swiper CSS (للشريط المتحرك) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-darker text-white min-h-screen font-sans overflow-x-hidden m-0 p-0 pb-20">

    <!-- القائمة العلوية -->
    <nav class="fixed w-full z-50 bg-darker/90 backdrop-blur-md border-b border-gray-800 transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- الشعار -->
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-film text-primary text-2xl"></i>
                    <span class="text-xl font-bold tracking-wider hidden sm:block">AWR Stream</span>
                </div>
                
                <!-- الروابط -->
                <div class="hidden md:flex space-x-6 space-x-reverse">
                    <a href="#" class="text-white hover:text-primary transition font-medium">الرئيسية</a>
                    <a href="#movies" class="text-gray-300 hover:text-white transition font-medium">أفلام</a>
                    <a href="#series" class="text-gray-300 hover:text-white transition font-medium">مسلسلات</a>
                    <a href="#anime" class="text-gray-300 hover:text-white transition font-medium">أنمي</a>
                    <a href="#kdrama" class="text-gray-300 hover:text-white transition font-medium">كيدراما</a>
                </div>

                <!-- الأيقونات (بحث، مفضلة، مشاهدة لاحقا) -->
                <div class="flex items-center gap-4">
                    <button class="text-gray-300 hover:text-white"><i class="fa-solid fa-magnifying-glass text-xl"></i></button>
                    <button class="text-gray-300 hover:text-yellow-400" title="المفضلة"><i class="fa-solid fa-star text-xl"></i></button>
                    <button class="text-gray-300 hover:text-blue-400" title="المشاهدة لاحقاً"><i class="fa-solid fa-bookmark text-xl"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- الشريط المتحرك (Hero Slider) -->
    <header class="relative w-full h-[60vh] md:h-[80vh] pt-16">
        <div class="swiper heroSwiper w-full h-full">
            <div class="swiper-wrapper" id="heroWrapper">
                <!-- سيتم حقن الشرائح هنا عبر JS -->
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next text-white/50 hover:text-white"></div>
            <div class="swiper-button-prev text-white/50 hover:text-white"></div>
        </div>
    </header>

    <!-- أقسام المحتوى -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 space-y-12">
        <!-- قسم الأفلام -->
        <section id="movies">
            <h2 class="text-2xl font-bold mb-4 border-r-4 border-primary pr-3">أحدث الأفلام</h2>
            <div class="flex overflow-x-auto gap-4 pb-4 scrollbar-hide snap-x" id="moviesContainer"></div>
        </section>

        <!-- قسم المسلسلات -->
        <section id="series">
            <h2 class="text-2xl font-bold mb-4 border-r-4 border-primary pr-3">مسلسلات رائجة</h2>
            <div class="flex overflow-x-auto gap-4 pb-4 scrollbar-hide snap-x" id="seriesContainer"></div>
        </section>

        <!-- قسم الكيدراما -->
        <section id="kdrama">
            <h2 class="text-2xl font-bold mb-4 border-r-4 border-primary pr-3">الدراما الكورية</h2>
            <div class="flex overflow-x-auto gap-4 pb-4 scrollbar-hide snap-x" id="kdramaContainer"></div>
        </section>
    </main>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
